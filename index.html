<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Lawin Canvas — LC-001 Harvest of Abundance</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #startScreen {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: linear-gradient(180deg, #2b1d0e 0%, #4a3319 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      color: #f5e6c8;
    }

    #startScreen h1 {
      font-size: 1.6rem;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    #startScreen p.subtitle {
      font-size: 1rem;
      opacity: 0.85;
      margin-bottom: 32px;
      max-width: 320px;
      line-height: 1.5;
    }

    #startButton {
      background: #d4a13a;
      color: #2b1d0e;
      border: none;
      padding: 16px 36px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 40px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    }

    #startButton:active {
      transform: scale(0.97);
    }

    #hintText {
      margin-top: 24px;
      font-size: 0.85rem;
      opacity: 0.6;
    }

    #scanOverlay {
      position: fixed;
      bottom: 30px;
      left: 0;
      right: 0;
      z-index: 500;
      text-align: center;
      color: #fff;
      font-size: 0.95rem;
      text-shadow: 0 2px 6px rgba(0,0,0,0.8);
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .example-container {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Start / permission screen -->
  <div id="startScreen">
    <h1>Lawin Canvas</h1>
    <p class="subtitle">LC-001 · Harvest of Abundance<br/>Biyaya ng Lumikha</p>
    <button id="startButton">Tap to Begin</button>
    <p id="hintText">This will ask for camera access.<br/>Point your camera at the painting once started.</p>
  </div>

  <div id="scanOverlay">Point your camera at the painting</div>

  <a-scene
    id="arScene"
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no; uiLoading: no;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >
    <a-assets>
      <video
        id="revealVideo"
        src="./reveal.mp4"
        preload="auto"
        loop="false"
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
      ></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <!-- Full overlay video plane matching painting aspect ratio (1536x1024 = 1.5) -->
      <a-video
        src="#revealVideo"
        position="0 0 0"
        width="1"
        height="0.667"
        rotation="0 0 0"
      ></a-video>
    </a-entity>
  </a-scene>

  <script>
    const startScreen = document.getElementById('startScreen');
    const startButton = document.getElementById('startButton');
    const scanOverlay = document.getElementById('scanOverlay');
    const sceneEl = document.getElementById('arScene');
    const video = document.getElementById('revealVideo');

    let hasPlayed = false;

    startButton.addEventListener('click', async () => {
      // Unlock audio/video playback with this user gesture
      try {
        video.muted = false;
        await video.play();
        video.pause();
        video.currentTime = 0;
      } catch (e) {
        console.warn('Video unlock warning:', e);
      }

      startScreen.style.display = 'none';

      const arSystem = sceneEl.systems['mindar-image'];
      arSystem.start(); // starts camera + tracking
    });

    const targetEntity = document.querySelector('[mindar-image-target]');

    targetEntity.addEventListener('targetFound', () => {
      scanOverlay.style.opacity = '0';
      video.currentTime = 0;
      video.play();
      hasPlayed = true;
    });

    targetEntity.addEventListener('targetLost', () => {
      scanOverlay.style.opacity = '1';
      video.pause();
    });

    video.addEventListener('ended', () => {
      // Freeze on last frame instead of disappearing; loop again if target still in view
      video.currentTime = 0;
      video.play();
    });
  </script>

</body>
</html>
